<content id="data-content">
    
    <style>

        .filter {
            margin-bottom: 10px;
		}
    
		.filter--value {
            display: flex;
            align-items: center;
		}

        .filter--value-hierarchical {
            width: 100%;
        }

        .filter--value-hierarchical pnp-filterhierarchical {
            display: block;
            width: 100%;
        }

        .filter--values-list {
			overflow: auto;
			max-height: 400px;
		}

        .filter--message {
			padding: 10px;
		}
		
	    .filter--name {
			font-family: {{@root.theme.fonts.large.fontFamily}};
			font-weight: {{@root.theme.fonts.large.fontWeight}};
			font-size: {{@root.theme.fonts.large.fontSize}};
			margin-bottom: 5px;
		}

        .filter--limit-warning-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            margin-left: 6px;
            border: 1px solid #d83b01;
            border-radius: 50%;
            color: #d83b01;
            background: transparent;
            font-size: 11px;
            font-weight: 700;
            line-height: 1;
            cursor: help;
            position: relative;
        }

        .filter--limit-warning-button:hover::after,
        .filter--limit-warning-button:focus-visible::after {
            content: attr(data-tooltip);
            position: absolute;
            top: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            max-width: 320px;
            padding: 6px 8px;
            background: #323130;
            color: #ffffff;
            font-size: 12px;
            font-weight: 400;
            white-space: normal;
            border-radius: 2px;
            z-index: 10;
        }

        .filter--limit-warning-sr-only {
            border: 0;
            clip: rect(0 0 0 0);
            height: 1px;
            margin: -1px;
            overflow: hidden;
            padding: 0;
            position: absolute;
            width: 1px;
            white-space: nowrap;
        }
        
        .filterPanelContent {
            padding-left: 32px;
            padding-right: 32px;
            margin-top: 15px;
        }

        .panelOpenBar {
            display: flex;
            align-items: center;
            font-weight: 500;
            padding: 5px;
        }

        .panelOpenBar button {
            margin-left: 3px;
            border: 0;
            padding: 0;
            background: transparent;
            color: inherit;
            font: inherit;
            cursor: pointer;
        }

        .panelOpenBar:hover {
            color: {{@root.theme.palette.themePrimary}};
        }

		pnp-filtercheckbox {
			max-width: 100%;
		}

		pnp-filtercombobox {
			width: 90%;
			max-width: 325px;
		}

		        	                
    </style>

    <div class="template">
        <pnp-panel   data-state-key="{{@root.instanceId}}"
                        data-disable-animation="true"
                        data-is-light-dismiss="{{@root.properties.layoutProperties.isLightDismiss}}"
                        data-is-blocking="{{@root.properties.layoutProperties.isBlocking}}"
                        data-size="{{@root.properties.layoutProperties.size}}"
                        data-theme-variant="{{JSONstringify @root.theme}}"
                        data-panel-header-text="{{@root.properties.layoutProperties.headerText}}">

            <template id="panel-open">
                <div class="panelOpenBar">
                    <pnp-icon data-name="Filter" data-theme-variant="{{JSONstringify @root.theme}}"></pnp-icon><button type="button" aria-label="{{@root.properties.layoutProperties.btnLabel}}">{{@root.properties.layoutProperties.btnLabel}}</button>
                </div>
            </template>

            <template id="panel-content">
                <div id="pnp-template_{{@root.instanceId}}">
                    <div class="filterPanelContent">
                        {{#each @root.filters as |filter|}}
                            <div class="filter">
                                {{#eq filter.selectedTemplate 'ComboBoxFilterTemplate'}}
                                        <div class="filter--name">{{filter.displayName}}{{#if filter.showLimitExceededWarning}} <button type="button" class="filter--limit-warning-button" title="{{filter.limitExceededWarningText}}" data-tooltip="{{filter.limitExceededWarningText}}" aria-label="{{filter.limitExceededWarningText}}" aria-describedby="filter-limit-warning-{{@root.instanceId}}-{{@index}}">i</button><span id="filter-limit-warning-{{@root.instanceId}}-{{@index}}" class="filter--limit-warning-sr-only">{{filter.limitExceededWarningText}}</span>{{/if}}</div>
                                        {{#if filter.warningMessages.length}}
                                            {{#each filter.warningMessages}}
                                                <div class="filter--message">{{this}}</div>
                                            {{/each}}
                                        {{/if}}
                                        <div class="filter--value">
                                            <pnp-filtercombobox 
                                                data-instance-id="{{@root.instanceId}}" 
                                                data-filter-name="{{filter.filterName}}" 
                                                data-is-multi="{{filter.isMulti}}"
                                                data-show-count="{{filter.showCount}}"
                                                data-operator="{{filter.operator}}"
                                                data-theme-variant="{{JSONstringify @root.theme}}"
                                                >
                                                    {{#each filter.values}}
                                                        <option value="{{value}}" data-selected="{{selected}}" data-disabled="{{disabled}}" data-count="{{count}}">{{name}}</option>
                                                    {{/each}}
                                            </pnp-filtercombobox>
                                        </div>
                                {{else}}
                                    <pnp-collapsible data-group-name="{{filter.displayName}}" data-group-storage-key="{{@root.instanceId}}::{{filter.filterName}}" data-show-warning-marker="{{filter.showWarningMarker}}" data-warning-marker-tooltip="{{filter.warningMarkerTooltipText}}" data-default-collapsed="{{#or filter.hasSelectedValues filter.expandByDefault}}false{{else}}true{{/or}}" data-theme-variant="{{JSONstringify @root.theme}}">
                                            
                                        <template id="collapsible-content" item-class="filter--value">
                                            {{#if filter.warningMessages.length}}
                                                {{#each filter.warningMessages}}
                                                    <div class="filter--message">{{this}}</div>
                                                {{/each}}
                                            {{/if}}
                
                                            {{#eq filter.selectedTemplate 'DateRangeFilterTemplate'}}
                                                <div class="filter--value">
                                                    <pnp-filterdaterange 
                                                        data-instance-id="{{@root.instanceId}}" 
                                                        data-filter="{{JSONstringify filter 2}}"
                                                        data-theme-variant="{{JSONstringify @root.theme}}"
                                                    >
                                                    </pnp-filterdaterange>
                                                </div>
                                            {{else}}
                                                {{#eq filter.selectedTemplate 'CheckboxFilterTemplate'}}

                                                    {{#if filter.isMulti}}
                                                        <div class="filter--option">
                                                            <pnp-filteroperator 
                                                                data-instance-id="{{@root.instanceId}}" 
                                                                data-filter-name="{{filter.filterName}}" 
                                                                data-operator="{{filter.operator}}" 
                                                                data-theme-variant="{{JSONstringify @root.theme}}"
                                                            ></pnp-filteroperator>
                                                        </div>
                                                    {{/if}}
                                                
                                                    <div class="filter--option">
                                                        <pnp-filtersearchbox data-filter="{{JSONstringify filter}}" data-instance-id="{{@root.instanceId}}" data-theme-variant="{{JSONstringify @root.theme}}"></pnp-filtersearchbox>
                                                    </div>
                                                    
                                                    <div class="filter--values-list" role="{{#if filter.isMulti}}group{{else}}radiogroup{{/if}}" aria-label="{{filter.displayName}}">
                                                        {{#each filter.values}}
                                                            <div title="{{name}} {{#if ../showCount}}({{count}}){{/if}}" class="filter--value">
                                                                <pnp-filtercheckbox 
                                                                    data-instance-id="{{@root.instanceId}}" 
                                                                    data-filter-name="{{filter.filterName}}" 
                                                                    data-name="{{name}}" 
                                                                    data-value="{{value}}" 
                                                                    data-selected="{{selected}}" 
                                                                    data-disabled="{{disabled}}" 
                                                                    data-count="{{count}}"
                                                                    data-is-multi="{{../isMulti}}"
                                                                    data-value-count="{{../values.length}}"
                                                                    data-value-index="{{@index}}"
                                                                    data-theme-variant="{{JSONstringify @root.theme}}"
                                                                >
                                                                </pnp-filtercheckbox>
                                                                {{#if ../showCount}}
                                                                    <span>({{count}})</span>
                                                                {{/if}}
                                                            </div>
                                                        {{/each}}
                                                    </div>
                                                {{else}}
                                                    {{#eq filter.selectedTemplate 'PeopleTemplate'}}
                                                        {{#if filter.isMulti}}
                                                            <div class="filter--option">
                                                                <pnp-filteroperator 
                                                                    data-instance-id="{{@root.instanceId}}"
                                                                    data-filter-name="{{filter.filterName}}" 
                                                                    data-operator="{{filter.operator}}" 
                                                                    data-theme-variant="{{JSONstringify @root.theme}}"
                                                                ></pnp-filteroperator>
                                                            </div>
                                                        {{/if}}

                                                        <div class="filter--option">
                                                            <pnp-filtersearchbox data-filter="{{JSONstringify filter}}" data-instance-id="{{@root.instanceId}}" data-theme-variant="{{JSONstringify @root.theme}}"></pnp-filtersearchbox>
                                                        </div>

                                                        <div class="filter--values-list" role="{{#if filter.isMulti}}group{{else}}radiogroup{{/if}}" aria-label="{{filter.displayName}}">
                                                            {{#each filter.values}}
                                                                <div title="{{name}} {{#if ../showCount}}({{count}}){{/if}}" class="filter--value">
                                                                    <pnp-filtercheckbox 
                                                                        data-instance-id="{{@root.instanceId}}" 
                                                                        data-filter-name="{{filter.filterName}}" 
                                                                        data-name="{{name}}" 
                                                                        data-value="{{value}}" 
                                                                        data-selected="{{selected}}" 
                                                                        data-disabled="{{disabled}}" 
                                                                        data-count="{{count}}"
                                                                        data-is-multi="{{../isMulti}}"
                                                                        data-value-count="{{../values.length}}"
                                                                        data-value-index="{{@index}}"
                                                                        data-theme-variant="{{JSONstringify @root.theme}}"
                                                                    >
                                                                    </pnp-filtercheckbox>
                                                                    {{#if ../showCount}}
                                                                        <span data-ui-test-id="filterCount">({{count}})</span>
                                                                    {{/if}}
                                                                </div>
                                                            {{/each}}
                                                        </div>
                                                    {{else}}
                                                        {{#eq filter.selectedTemplate 'StaticPeopleTemplate'}}
                                                            {{#if filter.isMulti}}
                                                                <div class="filter--option">
                                                                    <pnp-filteroperator 
                                                                        data-instance-id="{{@root.instanceId}}"
                                                                        data-filter-name="{{filter.filterName}}" 
                                                                        data-operator="{{filter.operator}}" 
                                                                        data-theme-variant="{{JSONstringify @root.theme}}"
                                                                    ></pnp-filteroperator>
                                                                </div>
                                                            {{/if}}
                                                            <div class="filter--option">
                                                                <pnp-peoplefilter
                                                                    data-instance-id="{{@root.instanceId}}"
                                                                    data-filter-name="{{filter.filterName}}"
                                                                    data-is-multi="{{filter.isMulti}}"
                                                                    data-static-picker="true"
                                                                    data-selected-values="{{JSONstringify filter.values 2}}"
                                                                    data-theme-variant="{{JSONstringify @root.theme}}"
                                                                ></pnp-peoplefilter>
                                                            </div>
                                                        {{else}}
                                                        {{#eq filter.selectedTemplate 'DateIntervalFilterTemplate'}}
                                                            <div class="filter--value">
                                                                <pnp-filterdateinterval 
                                                                    data-instance-id="{{@root.instanceId}}" 
                                                                    data-filter="{{JSONstringify filter 2}}"
                                                                    data-theme-variant="{{JSONstringify @root.theme}}"
                                                                >
                                                                </pnp-filterdateinterval>
                                                            </div>							
                                                        {{else}}
                                                            {{#eq filter.selectedTemplate 'HierarchicalFilterTemplate'}}
                                                                <div class="filter--value-hierarchical">
                                                                    {{{hierarchicalOperator filter @root.instanceId @root.theme}}}
                                                                    <pnp-filterhierarchical 
                                                                        data-instance-id="{{@root.instanceId}}" 
                                                                        data-filter="{{JSONstringify filter 2}}"
                                                                        data-selected-filters="{{JSONstringify @root.selectedFilters 2}}"
                                                                        data-theme-variant="{{JSONstringify @root.theme}}"
                                                                    >
                                                                    </pnp-filterhierarchical>
                                                                </div>
                                                            {{/eq}}
                                                        {{/eq}}
														{{/eq}}
                                                    {{/eq}}
                                                {{/eq}}
                                            {{/eq}}
                
                                        </template>
                
                                        <template id="collapsible-footer">
                                            {{#isnt filter.selectedTemplate 'DateRangeFilterTemplate'}}
                                                {{#eq filter.selectedTemplate 'HierarchicalFilterTemplate'}}
                                                    {{{hierarchicalMultiselect filter @root.instanceId @root.theme}}}
                                                {{else}}
                                                    {{#isnt filter.selectedTemplate 'TaxonomyPickerFilterTemplate'}}
                                                        {{#eq filter.values.length 0}}
															{{#isnt filter.selectedTemplate 'StaticPeopleTemplate'}}
																<div class="filter--message">
																	{{@root.strings.FilterNoValuesMessage}}
																</div>
															{{/isnt}}
                                                        {{else}}
                                                            {{#if filter.isMulti}}
                                                                <pnp-filtermultiselect 
                                                                    data-instance-id="{{@root.instanceId}}" 
                                                                    data-filter-name="{{filter.filterName}}" 
                                                                    data-apply-disabled="{{#if filter.canApply}}false{{else}}true{{/if}}" 
                                                                    data-clear-disabled="{{#if filter.canClear}}false{{else}}true{{/if}}"
                                                                    data-theme-variant="{{JSONstringify @root.theme}}"
                                                                >
                                                                </pnp-filtermultiselect>
                                                            {{/if}}
                                                        {{/eq}}
                                                    {{/isnt}}
                                                {{/eq}}
                                            {{/isnt}}
                                        </template>
                
                                    </pnp-collapsible>
                                {{/eq}}
                            </div>		
                        {{/each}}
                    </div>
                </div>
            </template>
        </pnp-panel>
	</div>
</content>
